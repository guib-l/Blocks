[project]
name = "Blocks"
version = "0.0.1"
description = "Project Blocks : first versions"
authors = [
    { name = "hsyfard", email = "hysfart@gmail.com" }
]
requires-python = ">=3.8"
dependencies = [
    "requests",
    "numpy>=1.24"
]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.black]
line-length = 88
target-version = ['py38']

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]
